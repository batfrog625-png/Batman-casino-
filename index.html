<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batman Slot Casino</title>
    <style>
        body { background-color: #0b0b0b; color: #f1c40f; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .logo { font-size: 2.5rem; margin: 20px 0; text-shadow: 0 0 10px #f1c40f; }
        .balance { background: #1a1a1a; padding: 10px; border-radius: 20px; border: 2px solid #f1c40f; display: inline-block; margin-bottom: 20px; min-width: 150px; }
        .reels { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .reel { width: 80px; height: 100px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 3rem; border: 4px solid #f1c40f; color: black; }
        .buttons { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .spin-btn { background: #f1c40f; color: black; border: none; padding: 15px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 10px; cursor: pointer; width: 200px; }
        .spin-btn:disabled { background: #555; cursor: not-allowed; }
        .free-btn { background: #333; color: #f1c40f; border: 1px solid #f1c40f; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-size: 0.9rem; margin-top: 10px; }
        #msg { margin-top: 20px; font-weight: bold; min-height: 24px; color: white; }
    </style>
</head>
<body>
    <div class="logo">BATMAN SLOTS</div>
    <div class="balance">Credits: <span id="balance">1000</span></div>
    
    <div class="reels">
        <div class="reel" id="r1">🦇</div>
        <div class="reel" id="r2">🦇</div>
        <div class="reel" id="r3">🦇</div>
    </div>

    <div class="buttons">
        <button class="spin-btn" id="btn" onclick="spin()">SPIN</button>
        <button class="free-btn" id="freeBtn" onclick="getFreeCredits()" style="display:none;">Get Free 1000 Credits</button>
    </div>

    <div id="msg">Good Luck, Bruce!</div>

    <script>
        let credits = 1000;
        const syms = ['🦇', '🃏', '💰', '💎', '👤'];

        function updateUI() {
            document.getElementById('balance').innerText = credits;
            if (credits < 50) {
                document.getElementById('freeBtn').style.display = 'block';
            } else {
                document.getElementById('freeBtn').style.display = 'none';
            }
        }

        function getFreeCredits() {
            credits += 1000;
            document.getElementById('msg').innerText = "Refilled! Go Win Some!";
            updateUI();
        }

        function spin() {
            if(credits < 50) { 
                document.getElementById('msg').innerText = "Not enough credits!";
                return; 
            }
            credits -= 50;
            updateUI();
            document.getElementById('btn').disabled = true;
            document.getElementById('msg').innerText = "Spinning...";
            let count = 0;
            let timer = setInterval(() => {
                document.getElementById('r1').innerText = syms[Math.floor(Math.random()*syms.length)];
                document.getElementById('r2').innerText = syms[Math.floor(Math.random()*syms.length)];
                document.getElementById('r3').innerText = syms[Math.floor(Math.random()*syms.length)];
                if(++count > 10) {
                    clearInterval(timer);
                    checkWin();
                }
            }, 100);
        }

        function checkWin() {
            const r1 = document.getElementById('r1').innerText;
            const r2 = document.getElementById('r2').innerText;
            const r3 = document.getElementById('r3').innerText;
            if(r1 === r2 && r2 === r3) {
                let winAmount = (r1 === '🦇') ? 10000 : 500;
                credits += winAmount;
                document.getElementById('msg').innerText = "JACKPOT! +" + winAmount;
            } else if (r1 === r2 || r1 === r3 || r2 === r3) {
                credits += 70;
                document.getElementById('msg').innerText = "Small Win! +70";
            } else {
                document.getElementById('msg').innerText = "Try Again!";
            }
            updateUI();
            document.getElementById('btn').disabled = false;
        }
    </script>
</body>
</html>
